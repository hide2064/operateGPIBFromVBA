;=============================================================================
; settings.ini - GPIB Controller 設定ファイル
;
; VBA / Python 両方がこのファイルを参照する。
; 変更後はFlaskサーバーを再起動すること。
;=============================================================================

[Server]
; Flaskサーバーのバインドアドレスとポート
Host=127.0.0.1
Port=5000

; Python実行ファイル (フルパス or PATH上のコマンド)
PythonExe=python

; server.py の絶対パス (VBAがサーバーを自動起動する際に使用)
ServerScript=C:\work\operateGPIBFromVBA\operateGPIBFromVBA\python\server.py

; サーバー起動確認のタイムアウト秒数
HealthTimeoutSec=10

; GPIBコマンド失敗時の自動再試行回数
MaxRetry=1

[Logging]
; ログレベル: DEBUG / INFO / WARNING / ERROR
Level=INFO

; ログ出力先ディレクトリ (settings.ini からの相対パス → プロジェクトルートの logs/)
LogDir=logs

; ログファイル名
FileName=gpib.log

; 1ファイルの最大バイト数 (超えたらローテーション)
MaxBytes=1000000

; 保持するバックアップファイル数
BackupCount=3

; ログフォーマット
Format=%%(asctime)s [%%(levelname)s] %%(name)s: %%(message)s

[Lan]
; Raw Socket 接続のデフォルト TCP ポート番号 (SCPI over TCP の業界標準: 5025)
DefaultSocketPort=5025

; Raw Socket 接続の終端文字 (LF=\n / CR=\r / CRLF=\r\n)
; 機器によって異なる場合は Config シートの個別設定が優先される
ReadTermination=\n
WriteTermination=\n
